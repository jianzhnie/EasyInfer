# ==============================================================================
# GLM-5.2 分布式推理部署 — 全局配置文件
# ==============================================================================
# 所有节点（PNode / DNode）的差异化参数全部集中在此文件中。
# 每个节点根据 NODE_INDEX 和 NODE_ROLE 自动读取本节点的配置，
# 避免维护 8 份几乎相同的脚本。
#
# 使用方法：编辑本文件后，在目标节点上执行
#   start_pnode.sh <node_index>    或    start_dnode.sh <node_index>
# 其中 node_index 对应下方表中的序号（0-based）。
# ==============================================================================

# ---- 通用参数 ---------------------------------------------------------------
MODEL_PATH="/home/jianzhnie/llmtuner/hfhub/models/Eco-Tech/GLM-5.2-w8a8"
NIC_NAME="enp66s0f0"              # 网卡名，所有节点共用
LOG_DIR="/home/jianzhnie/llmtuner/llm/EasyInfer/logs"           # 日志目录
SERVED_MODEL_NAME="glm-52"

# ---- Prefill 节点（PNode）全局参数 ------------------------------------------
P_DP_SIZE=4                       # 总 DP 数（所有 PNode 之和）
P_TP_SIZE=8                       # 每实例 TP 数
P_DP_SIZE_LOCAL=1                 # 本机 DP 数
P_DP_RPC_PORT=16591               # DP RPC 端口
P_VLLM_START_PORT=9081            # vLLM API 起始端口
P_MAX_MODEL_LEN=135168
P_MAX_NUM_BATCHED_TOKENS=8192
P_MAX_NUM_SEQS=64
P_GPU_MEM_UTIL=0.92

# ---- Decode 节点（DNode）全局参数 -------------------------------------------
D_DP_SIZE=8                       # 总 DP 数（所有 DNode 之和）
D_TP_SIZE=4                       # 每实例 TP 数
D_DP_SIZE_LOCAL=2                 # 本机 DP 数（每进程管理 2 个 DP rank）
D_DP_RPC_PORT=16600               # DP RPC 端口
D_VLLM_START_PORT=9900            # vLLM API 起始端口
D_MAX_MODEL_LEN=135168
D_MAX_NUM_BATCHED_TOKENS=164
D_MAX_NUM_SEQS=32
D_GPU_MEM_UTIL=0.92

# ---- Prefill 节点列表 --------------------------------------------------------
# 格式: PNODE_IPS[i] = 第 i 个 PNode 的 IP
# 对应原始文档:
#   index 0 -> 10.18.1.10  (dp-rank-start 0)
#   index 1 -> 10.18.1.11  (dp-rank-start 1)
#   index 2 -> 10.18.1.12  (dp-rank-start 2)
#   index 3 -> 10.18.1.13  (dp-rank-start 3)
# dp-address 统一指向 rank-0 节点（10.18.1.10）
PNODE_IPS=(
    "10.42.11.138"
    "10.42.11.139"
    "10.42.11.140"
    "10.42.11.141"
)
P_DP_ADDRESS="10.42.11.138"     # DP master 地址 = PNode 0

# ---- Decode 节点列表 ---------------------------------------------------------
# 格式: DNODE_IPS[i] = 第 i 个 DNode 的 IP
# 对应原始文档:
#   index 0 -> 10.18.1.14  (dp-rank-start 0)
#   index 1 -> 10.18.1.15  (dp-rank-start 2)
#   index 2 -> 10.18.1.16  (dp-rank-start 4)
#   index 3 -> 10.18.1.17  (dp-rank-start 6)
# dp-address 统一指向 rank-0 节点（10.18.1.14）
DNODE_IPS=(
    "10.42.11.142"
    "10.42.11.143"
    "10.42.11.144"
    "10.42.11.145"
)
D_DP_ADDRESS="10.42.11.142"     # DP master 地址 = DNode 0

# ---- DNode dp-rank-start 映射 -----------------------------------------------
# DNode 的 dp-rank-start 不等于 node_index，需要单独映射
DNODE_RANK_STARTS=(0 2 4 6)
