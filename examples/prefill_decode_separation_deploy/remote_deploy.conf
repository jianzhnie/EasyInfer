# ==============================================================================
# remote_deploy.conf — 批量远程部署配置文件
# ==============================================================================
# 在控制节点（如 10.18.1.21）上编辑此文件，然后执行:
#   ./remote_launch_deploy_pd_seg.sh deploy   一键全流程部署
#   ./remote_launch_deploy_pd_seg.sh status   检查所有节点状态
#   ./remote_launch_deploy_pd_seg.sh stop     停止所有节点
#
# 格式: KEY=VALUE，不支持行内注释（# 必须独占一行）。
# ==============================================================================

# ---- 模型类型 ---------------------------------------------------------------
# 可选值: glm52, deepseek-v4-pro
MODEL_TYPE=deepseek-v4-pro

# ---- SSH 连接参数 ------------------------------------------------------------
SSH_USER=root
SSH_PORT=22
SSH_KEY=~/.ssh/id_rsa
# SSH 连接超时（秒），用于探测节点是否可达
SSH_CONNECT_TIMEOUT=10

# ---- 远程路径 ---------------------------------------------------------------
# 共享存储：脚本目录对所有节点可见，无需分发
# REMOTE_SCRIPT_DIR 默认同 LOCAL_SCRIPT_DIR，也可显式指定:
# REMOTE_SCRIPT_DIR=/home/jianzhnie/llmtuner/llm/EasyInfer/examples/prefill_decode_separation_deploy/deepseek-v4-pro-deploy-scripts
# Proxy 脚本目录（留空则使用本工具同级目录）
# PROXY_SCRIPT_DIR=/data/scripts
# Docker 容器名（所有节点统一）
DOCKER_NAME=vllm-ascend-env

# ---- 健康检查 ---------------------------------------------------------------
# 等待 vLLM 启动的最大秒数（每 10 秒轮询一次）
HEALTH_CHECK_TIMEOUT=600
# 健康检查间隔（秒）
HEALTH_CHECK_INTERVAL=10

# ---- 部署流程控制 -----------------------------------------------------------
# 是否在部署前清理已有 vLLM 进程（true/false）
CLEAN_BEFORE_DEPLOY=true

# ---- Proxy 参数 -------------------------------------------------------------
# Proxy 脚本需要 Python 3.10+（系统默认为 3.9，需指定更高版本）
PROXY_PYTHON=/home/jianzhnie/llmtuner/software/miniconda3/bin/python3.13
PROXY_HOST=0.0.0.0
PROXY_PORT=8000
# Proxy 日志级别（DEBUG / INFO / WARNING / ERROR），默认 INFO
# PROXY_LOG_LEVEL=INFO
# Proxy 启动等待秒数
PROXY_WAIT=10

# ---- PNode 列表（4 台）------------------------------------------------------
PNODE_IPS=(10.42.11.138 10.42.11.139 10.42.11.140 10.42.11.141)

# ---- DNode 列表（4 台）------------------------------------------------------
DNODE_IPS=(10.42.11.142 10.42.11.143 10.42.11.144 10.42.11.145)

# ---- 统一备用节点池（PNode 或 DNode 启动失败时自动替换，可为空）---------------
# 备用节点必须与主节点硬件配置一致，Docker 环境和模型权重已就绪
# BACKUP_IPS=(10.18.1.X 10.18.1.Y)

# ---- Proxy 节点（即控制节点本身）--------------------------------------------
PROXY_NODE_IP=10.42.11.130
